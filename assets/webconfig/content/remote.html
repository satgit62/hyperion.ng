<div class="container-fluid">
  <h3 class="page-header"><i class="fa fa-wifi fa-fw"></i><span data-i18n="main_menu_remotecontrol_token">Remote
      Control</span>
  </h3>

  <div class="row">
    <!-- Instance(s) -->
    <div class="row gy-2"></div>
    <div class="card card-default" style="border:0;">
      <div class="card-header card-instance">
        <div class="dropdown">
          <button class="btn dropdown-toggle bg-transparent border-0 p-0 text-start" id="active_instance_dropdown"
            type="button" data-bs-toggle="dropdown" aria-expanded="false"
            style="display:flex;align-items:center;color:inherit;box-shadow:none;">
            <span class="mdi mdi-lightbulb-group" style="margin-right:5px;"></span>
            <div id="active_instance_friendly_name"></div>
          </button>
          <ul class="dropdown-menu" id="hyp_inst_listing" style="cursor:pointer;"></ul>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="row gy-2">

      <div class="col-md-12 col-lg-8 col-xxl-9">
        <div id="conf_cont_sourceSelection">
        </div>
      </div>

      <div class="col-md-6 col-lg-4 col-xxl-3">
        <div class="card card-default">
          <div class="card-header"><i class="fa fa-wifi fa-fw"></i><span data-i18n="remote_components_label">Components
              control</span></div>
          <div class="card-body" id="comp_intro">
            <div id="components"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="row gy-2">
      <div class="col-md-6 col-lg-6 col-xxl-5">
        <div id="conf_cont_colorEffects">
        </div>
      </div>

      <div class="col-md-6 col-lg-6 col-xxl-4">
        <div id="conf_cont_imageProcessing">
        </div>
      </div>

      <div class="col-md-6 col-lg-6 col-xxl-3">
        <div class="card card-default">
          <div class="card-header"><i class="fa fa-wifi fa-fw"></i><span data-i18n="remote_videoMode_label"></span>
          </div>
          <div class="card-body" id="videomode_intro">
            <div id="videomodebtns"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6 col-lg-6 col-xxl-5">
        <div id="conf_cont_channelAdjustment">
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/content_remote.js"></script>
